<div class="app-shell" [class.rtl]="lang.isRTL()">

  <!-- Top Header -->
  <header class="app-header">
    <button
      class="sidebar-toggle"
      (click)="toggleSidebar()"
      [class.open]="sidebarOpen"
      [attr.aria-label]="lang.isArabic() ? 'فتح/إغلاق القائمة' : 'Toggle navigation menu'"
      [attr.aria-expanded]="sidebarOpen"
      aria-controls="course-sidebar"
    >
      <span></span><span></span><span></span>
    </button>

    <a routerLink="/" class="app-logo">
      <span class="logo-icon">💻</span>
      <span class="logo-text">
        {{ lang.isArabic() ? 'مقدمة في البرمجة' : 'Intro to Programming' }}
      </span>
    </a>

    <div class="header-right">
      <div
        class="progress-pill"
        role="progressbar"
        [attr.aria-valuenow]="course.progressPercent()"
        aria-valuemin="0"
        aria-valuemax="100"
        [attr.aria-label]="lang.isArabic() ? 'تقدم الدورة' : 'Course progress'"
      >
        <div class="progress-pill-bar">
          <div class="progress-pill-fill" [style.width.%]="course.progressPercent()"></div>
        </div>
        <span class="progress-pill-text">{{ course.progressPercent() }}%</span>
      </div>

      <button
        class="theme-toggle"
        (click)="toggleTheme()"
        [title]="theme.isDark() ? (lang.isArabic() ? 'الوضع الفاتح' : 'Light mode') : (lang.isArabic() ? 'الوضع الداكن' : 'Dark mode')"
        [attr.aria-label]="theme.isDark() ? (lang.isArabic() ? 'التبديل إلى الوضع الفاتح' : 'Switch to light mode') : (lang.isArabic() ? 'التبديل إلى الوضع الداكن' : 'Switch to dark mode')"
      >
        {{ theme.isDark() ? '☀️' : '🌙' }}
      </button>

      <button
        class="lang-toggle"
        (click)="toggleLanguage()"
        [title]="lang.isArabic() ? 'Switch to English' : 'التبديل إلى العربية'"
        [attr.aria-label]="lang.isArabic() ? 'Switch to English' : 'التبديل إلى العربية'"
      >
        <span class="lang-current">{{ lang.isArabic() ? 'AR' : 'EN' }}</span>
        <span class="lang-sep">/</span>
        <span class="lang-other">{{ lang.isArabic() ? 'EN' : 'AR' }}</span>
      </button>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="app-body">

    <!-- Content Area -->
    <main class="app-content" (click)="sidebarOpen && toggleSidebar()">
      <router-outlet />
    </main>

    <!-- Sidebar (right for LTR, left for RTL) -->
    <aside id="course-sidebar" class="app-sidebar" [class.open]="sidebarOpen">
      <app-sidebar />
    </aside>

  </div>

  <!-- Mobile overlay -->
  @if (sidebarOpen) {
    <div class="sidebar-overlay" (click)="toggleSidebar()"></div>
  }

</div>
